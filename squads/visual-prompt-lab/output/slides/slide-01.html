<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1350px; overflow:hidden; font-family:'Inter',sans-serif; position:relative; background:#07070f; }
  .bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .overlay { position:absolute; inset:0; background: linear-gradient(180deg, rgba(7,7,15,0.15) 0%, rgba(7,7,15,0.12) 35%, rgba(76,29,149,0.55) 62%, rgba(7,7,15,0.97) 100%); }

  .topbar { position:absolute; top:44px; left:48px; right:48px; display:flex; justify-content:space-between; align-items:center; color:#f0f0ff; font-weight:700; font-size:26px; opacity:0.95; text-shadow:0 2px 8px rgba(0,0,0,0.5); }

  .content { position:absolute; left:0; right:0; bottom:0; padding: 0 56px 86px; text-align:center; }
  .kicker { color:#f0f0ff; font-weight:700; font-size:34px; margin-bottom:6px; text-shadow:0 2px 10px rgba(0,0,0,0.6); }
  .bigword { font-family:'Inter', sans-serif; font-weight:900; font-size:166px; line-height:0.92; letter-spacing:-3px;
    background: linear-gradient(135deg, #a855f7 0%, #c084fc 55%, #f0f0ff 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter: drop-shadow(0 0 40px rgba(168,85,247,0.55)) drop-shadow(0 6px 30px rgba(0,0,0,0.5));
    margin-bottom:30px;
  }
  .subtext { color:#f0f0ff; font-weight:600; font-size:38px; line-height:1.35; max-width:880px; margin:0 auto 44px; text-shadow:0 2px 10px rgba(0,0,0,0.6); }
  .subtext b { font-weight:800; color:#c084fc; }
  .cta { display:inline-flex; align-items:center; gap:14px; background:rgba(7,7,15,0.6); border:2px solid #a855f7; color:#fff; font-weight:700; font-size:28px; padding:18px 36px; border-radius:100px; box-shadow:0 0 30px rgba(168,85,247,0.35); }
</style>
</head>
<body>
  <img class="bg" src="https://d8j0ntlcm91z4.cloudfront.net/user_3DOz7KubXj6fBFNZsJ1fgXXQEsx/hf_20260701_234222_036688ba-4894-487b-924d-fa51b9fe7c71.png" />
  <div class="overlay"></div>
  <div class="topbar"><span>@jaokdev</span><span>Sites &amp; Automação</span></div>

  <div class="content">
    <div class="kicker">Seu negócio está</div>
    <div class="bigword">INVISÍVEL</div>
    <div class="subtext">Se ainda acha que <b>ter WhatsApp já basta</b>, é assim que seu negócio aparece pra quem procura no Google.</div>
    <div class="cta">Arraste para o lado →</div>
  </div>
</body>
</html>
