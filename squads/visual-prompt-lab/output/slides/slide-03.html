<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1350px; overflow:hidden; font-family:'Inter',sans-serif; background:#07070f; color:#f0f0ff; }
  .wrap { padding:80px 64px 64px; height:100%; display:flex; flex-direction:column; }
  .eyebrow { font-weight:800; font-size:34px; color:#c084fc; text-transform:uppercase; letter-spacing:1px; margin-bottom:14px; }
  .headline { font-weight:900; font-size:60px; line-height:1.1; letter-spacing:-1px; margin-bottom:56px; }

  .card { background:#0d0d1a; border:1px solid rgba(168,85,247,0.22); border-radius:28px; padding:48px 44px; margin-bottom:24px; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  .badgerow { display:flex; align-items:center; justify-content:center; gap:28px; margin-bottom:40px; }
  .clock { width:170px; height:170px; border-radius:50%; border:8px solid #a855f7; position:relative; background:#07070f; box-shadow:0 0 30px rgba(168,85,247,0.35); }
  .hand { position:absolute; background:#c084fc; border-radius:4px; top:50%; left:50%; transform-origin:0% 50%; }
  .hand.h { width:52px; height:8px; transform:rotate(-40deg) translateY(-50%); }
  .hand.m { width:64px; height:6px; transform:rotate(70deg) translateY(-50%); }
  .badge24 { font-weight:900; font-size:64px;
    background: linear-gradient(135deg, #a855f7, #c084fc);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  .timeline { display:flex; justify-content:space-between; align-items:center; margin-top:12px; }
  .tpoint { text-align:center; flex:1; }
  .tdot { width:20px; height:20px; border-radius:50%; background:#a855f7; margin:0 auto 14px; box-shadow:0 0 14px rgba(168,85,247,0.6); }
  .tline { position:relative; }
  .tline::before { content:""; position:absolute; top:9px; left:0; right:0; height:4px; background:#26263a; z-index:0; }
  .tlabel { font-size:26px; font-weight:600; color:#9a9ab5; }

  .caption { font-size:36px; line-height:1.42; font-weight:500; margin-top:56px; color:#d6d6ea; }
  .caption b { font-weight:800; color:#c084fc; }
  .tag { display:inline-block; margin-top:34px; background:linear-gradient(135deg,#7c3aed,#a855f7); color:#fff; font-weight:700; font-size:26px; padding:14px 28px; border-radius:100px; align-self:flex-start; box-shadow:0 0 24px rgba(168,85,247,0.35); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Ideia 2:</div>
    <div class="headline">Site não é gasto, é vitrine aberta 24h</div>

    <div class="card">
      <div class="badgerow">
        <div class="clock"><div class="hand h"></div><div class="hand m"></div></div>
        <div class="badge24">24H</div>
      </div>
      <div class="tline">
        <div class="timeline">
          <div class="tpoint"><div class="tdot"></div><div class="tlabel">00h</div></div>
          <div class="tpoint"><div class="tdot"></div><div class="tlabel">06h</div></div>
          <div class="tpoint"><div class="tdot"></div><div class="tlabel">12h</div></div>
          <div class="tpoint"><div class="tdot"></div><div class="tlabel">18h</div></div>
          <div class="tpoint"><div class="tdot"></div><div class="tlabel">23h</div></div>
        </div>
      </div>
    </div>

    <div class="caption">Sua loja fecha, o WhatsApp você não responde de madrugada — mas o <b>site continua mostrando seu trabalho</b> e gerando contato, mesmo enquanto você dorme.</div>
    <div class="tag">Presença Digital</div>
  </div>
</body>
</html>
