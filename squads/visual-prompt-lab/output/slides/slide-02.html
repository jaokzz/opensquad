<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1350px; overflow:hidden; font-family:'Inter',sans-serif; background:#07070f; color:#f0f0ff; }
  .wrap { padding:80px 64px 64px; height:100%; display:flex; flex-direction:column; }
  .eyebrow { font-weight:800; font-size:34px; color:#c084fc; text-transform:uppercase; letter-spacing:1px; margin-bottom:14px; }
  .headline { font-weight:900; font-size:60px; line-height:1.1; letter-spacing:-1px; margin-bottom:56px; }

  .card { background:#0d0d1a; border:1px solid rgba(168,85,247,0.22); border-radius:28px; padding:44px; margin-bottom:24px; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  .browserbar { display:flex; align-items:center; gap:10px; margin-bottom:32px; }
  .dot { width:16px; height:16px; border-radius:50%; background:#26263a; }
  .urlbar { flex:1; height:36px; background:#12121f; border-radius:100px; margin-left:12px; }

  .result { display:flex; align-items:center; gap:24px; padding:24px; border-radius:18px; margin-bottom:18px; }
  .result.win { background:rgba(168,85,247,0.12); border:3px solid #a855f7; }
  .result.lose { background:#12121f; opacity:0.55; }
  .badge { width:64px; height:64px; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:32px; flex-shrink:0; }
  .badge.win { background:linear-gradient(135deg,#7c3aed,#c084fc); }
  .badge.lose { background:#26263a; }
  .rlines { flex:1; }
  .rtitle { font-weight:700; font-size:32px; margin-bottom:10px; color:#f0f0ff; }
  .rbar { height:16px; border-radius:8px; background:#26263a; }
  .rbar.short { width:55%; }
  .result.win .rbar { background:#c084fc; }

  .caption { font-size:36px; line-height:1.42; font-weight:500; margin-top:56px; color:#d6d6ea; }
  .caption b { font-weight:800; color:#c084fc; }
  .tag { display:inline-block; margin-top:34px; background:linear-gradient(135deg,#7c3aed,#a855f7); color:#fff; font-weight:700; font-size:26px; padding:14px 28px; border-radius:100px; align-self:flex-start; box-shadow:0 0 24px rgba(168,85,247,0.35); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Ideia 1:</div>
    <div class="headline">Seu concorrente já apareceu no Google. E você?</div>

    <div class="card">
      <div class="browserbar">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="urlbar"></div>
      </div>
      <div class="result win">
        <div class="badge win">🏪</div>
        <div class="rlines">
          <div class="rtitle">Concorrente — site ativo</div>
          <div class="rbar"></div>
        </div>
      </div>
      <div class="result lose">
        <div class="badge lose">🚫</div>
        <div class="rlines">
          <div class="rtitle">Seu negócio — não aparece</div>
          <div class="rbar short"></div>
        </div>
      </div>
    </div>

    <div class="caption">Quem procura <b>"seu tipo de negócio + sua cidade"</b> precisa te encontrar. Sem site, quem aparece é o concorrente — e é ele que fecha a venda.</div>
    <div class="tag">Presença Digital</div>
  </div>
</body>
</html>
