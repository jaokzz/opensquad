squad:
  code: "apostas-esportivas"
  name: "Squad Apostas Esportivas"
  description: >
    Squad completo de apostas esportivas especializado em Copa do Mundo 2026 e competições com
    oportunidades de valor. Realiza análise pré-jogo detalhada com base em estatísticas avançadas
    (xG, xGA, H2H, forma recente, lesões), identifica apostas de valor com odd-alvo de 14-20x
    em múltiplas, monitora jogos ao vivo para proteção e oportunidades adicionais, e emite
    recomendações validadas por revisão crítica. Cada entrada é R$150 em múltiplas compostas
    por legs de alto valor identificados via Superbet e Betano.

research_brief: |
  ## Frameworks de Análise Pré-Jogo

  A análise pré-jogo profissional para apostas em futebol parte de um princípio central: identificar
  a diferença entre a probabilidade real de um evento e a probabilidade implícita embutida nas odds
  pela casa de apostas. O trabalho do analista é encontrar e explorar essas lacunas.

  O framework estabelecido pelos principais guias de análise estrutura o processo em seis pilares
  obrigatórios: (1) Forma recente — mínimo de 5 a 10 partidas para identificar tendências
  direcionais como "equipe em melhora" ou "equipe em queda"; (2) Histórico de confrontos diretos
  (H2H) — últimas 5 a 10 partidas entre as equipes, com atenção especial a padrões de placar,
  gols e comportamento em contextos similares; (3) Notícias de equipe — lesões, suspensões e
  escalações confirmadas, especialmente informações divulgadas próximas ao apito inicial ("late
  team news"), que criam janelas de valor antes que o mercado precifique o impacto; (4) Contexto
  de tabela e motivação — equipes em situação de rebaixamento, disputas por título ou confrontos
  de rivalidade regional apresentam padrões comportamentais distintos; (5) Dados de casa e fora
  separados — o desempenho de uma equipe fora de casa pode ser radicalmente diferente do
  desempenho em casa, e combinar os dois distorce a análise; (6) Camada avançada de dados:
  xG (gols esperados), xGA (gols esperados contra), intensidade de pressão, bolas paradas,
  tendências de árbitro e métricas de posse direcional.

  A literatura especializada alerta para o "recency bias" — a tendência de supervalorizar os
  resultados mais recentes em detrimento de amostras maiores e mais representativas. Um analista
  profissional pondera os dados recentes sem negligenciar padrões estabelecidos ao longo da
  temporada.

  ## Value Betting: Metodologia e Cálculo

  Value bet é qualquer aposta onde a probabilidade real de um evento supera a probabilidade
  implícita na odd oferecida. A fórmula central é:

    Probabilidade Implícita (%) = 1 / Odd decimal × 100
    Valor Esperado (EV) = (Probabilidade real × (Odd − 1)) − (Probabilidade de perda × 1)

  Um EV positivo indica que a aposta tem valor matemático. O Critério de Kelly refinado permite
  dimensionar o stake proporcional ao edge identificado:
    F = (bp − q) / b  onde b = odd−1, p = probabilidade real, q = 1−p

  O indicador Closing Line Value (CLV) é utilizado por profissionais para avaliar a qualidade
  das apostas a longo prazo: se a odd obtida na entrada é consistentemente superior à odd de
  fechamento (minutos antes do jogo), o apostador demonstra edge real sobre o mercado.

  A margem da casa (vigorish ou "vig") é o spread embutido nas odds que garante lucro à casa
  independentemente do resultado. Identificar apostas onde o EV supera essa margem é o objetivo
  central da metodologia.

  Erros comuns: (a) confundir odd alta com value — uma odd de 10.00 não tem valor se a probabilidade
  real do evento for de apenas 5%; (b) avaliar resultados por amostra única — value betting é uma
  estratégia de longo prazo validada por centenas de apostas; (c) ignorar a margem embutida ao
  comparar odds entre casas.

  ## Gestão de Banca para Múltiplas com Odd-Alvo 14-20x

  Apostas múltiplas (parlays) amplificam risco e retorno de forma multiplicativa. Uma múltipla de
  quatro legs a odds médias de 2.00 cada entrega aproximadamente 16x, alinhada ao alvo do squad.
  Porém, a probabilidade de acerto cumulativo cai exponencialmente: quatro legs a 50% cada = 6.25%
  de chance de acerto total.

  A abordagem profissional para múltiplas posiciona esse tipo de aposta como complementar, não
  central. A alocação recomendada é de 5 a 15% do volume total de apostas. Para stakes fixos de
  R$150 por entrada (como definido neste squad), o volume deve ser calibrado em relação à banca
  total disponível.

  Regras operacionais validadas pela literatura:
  - Limitar entre 3 e 5 legs por múltipla para equilibrar retorno e probabilidade
  - Cada leg deve ser selecionado de forma independente, com value identificado individualmente
  - Nunca incluir legs correlacionados positivamente (ex: vitória do time + jogador desse time
    como artilheiro) que inflem artificialmente a odd combinada sem valor real
  - Stop loss diário: suspender operações ao atingir −3 entradas no dia
  - Registro histórico de ROI por tipo de mercado e competição para auditoria mensal

  ## Monitoramento ao Vivo: Indicadores e Estratégia

  O monitoramento ao vivo exige leitura de dados em tempo real e velocidade de decisão. Os
  principais indicadores a monitorar durante um jogo incluem: posse de bola por período (mudanças
  bruscas indicam ajustes táticos), chutes a gol e finalizações no gol (xG acumulado ao vivo),
  contagem de escanteios como proxy de pressão ofensiva, cartões e expulsões que alteram o
  equilíbrio, e substituições — especialmente a entrada de peças ofensivas em times que
  precisam de gol.

  Situações típicas que geram valor ao vivo:
  (a) Time favorito sofre gol inesperado nos primeiros minutos — odds sobem além do justificado
  pela qualidade real do embate; (b) Empate sem gols após 30+ minutos com ambos os times
  criando chances — mercado Over 1.5 gols passa a ter valor crescente; (c) Expulsão de jogador
  do time que está vencendo — odds do adversário corrigem para cima rapidamente.

  A "cash-out strategy" (resgatar antecipadamente parte do retorno) é ferramenta de gestão de
  risco: se uma múltipla tem 3 de 4 legs ganhos e o último leg é favorável mas incerto, o
  cash-out parcial garante retorno positivo independentemente do resultado final.

  ## Copa do Mundo 2026: Análise de Favoritos e Mercados

  A Copa do Mundo 2026, com formato expandido de 48 seleções e jogos nos EUA, México e Canadá,
  apresenta dinâmicas específicas para apostas:

  Ranking de probabilidades de título (modelo Opta, junho/2026):
  - Espanha: 15.58% — odds ~5.50 (Superbet). Domínio de posse, campeã da Eurocopa 2024 com
    Lamine Yamal, Pedri e Rodri. Sistema de jogo previsível mas de alta eficiência.
  - França: 12.70% — odds ~6.00. Elenco mais profundo do torneio com Mbappé, Dembélé, Tchouaméni
    e Camavinga. Vice-campeã em 2022.
  - Inglaterra: 11.18% — odds ~7.50. Preparação sob Tuchel com 8V-0D nas eliminatórias europeias.
    Bellingham, Kane e Foden em nível de pico.
  - Argentina: 10.43% — odds ~9.50. Campeã defensora com Messi em potencial última Copa.
    Mentalidade de campeão, mas elenco com alguns pontos de envelhecimento.
  - Brasil: 6.78% — odds ~9.00. Ancelotti no comando, Vini Jr. e Raphinha como referências.
    Histórico positivo em torneios no continente americano.

  Dark horses com valor potencial: Alemanha (reestruturação defensiva sólida), Marrocos
  (surpreendeu em 2022, organização tática de alto nível), Portugal (Ronaldo em despedida
  histórica, mas elenco com Bruno Fernandes e Cancelo ainda competitivo), Colômbia (James
  Rodríguez + geração jovem).

  O formato de 48 times favorece seleções grandes na fase de grupos (mais jogos, mais oportunidades
  de rotação), mas aumenta probabilidade de upset nas fases eliminatórias (mais jogos single-elim).

  ## Fontes de Dados: Hierarquia e Uso Profissional

  A combinação ideal de fontes para análise profissional é:
  - **FBref**: xG, xGA, progressive passes, pressão defensiva — base analítica quantitativa
  - **SofaScore**: cobertura ao vivo mais abrangente, heatmaps, ratings de jogadores por partida
  - **WhoScored**: ratings por posição, análise tática, notícias de equipe e escalações
  - **Transfermarkt**: valor de mercado e contexto de elenco, lesões históricas
  - **Understat**: xPoints para comparação de desempenho real vs. esperado ao longo da temporada
  - **FootyStats / StatisticSports**: dados de over/under, BTTS, escanteios por partida

  Critério de qualidade: cross-referenciar o xG de ao menos duas fontes antes de incluí-lo na
  análise. Divergências acima de 0.3 xG entre plataformas devem ser investigadas antes de
  qualquer conclusão.

  Terminologia profissional consolidada: xG (expected goals), xGA (expected goals against), BTTS
  (both teams to score), Over/Under de gols, CLV (closing line value), EV (expected value),
  H2H (head-to-head), form streak, clean sheet, HT/FT (intervalo/resultado final), DNB
  (draw no bet), AH (asian handicap), value edge, ROI (return on investment), unit (unidade
  padrão de stake).

agents:
  - id: "rafael-rodrigues"
    name: "Rafael Rodrigues"
    title: "Pesquisador de Dados Esportivos"
    icon: "🔍"
    execution: "subagent"
    role_summary: >
      Responsável por coletar, organizar e validar todos os dados brutos necessários para
      a análise do confronto. Consulta SofaScore, FBref, WhoScored e Transfermarkt para
      extrair forma recente, H2H, lesões, escalações prováveis e odds atuais em Superbet e
      Betano. Entrega um dossiê estruturado e objetivo, sem interpretação — apenas dados
      verificados com fonte identificada.
    skills:
      - "web_search"
      - "web_fetch"
    tasks:
      - name: "Coleta de dados do confronto"
        file: "tasks/coleta-dados.md"
        description: >
          Pesquisa completa de forma recente, H2H, lesões, escalações, xG, xGA e odds
          atuais para o confronto solicitado. Entrega dossiê estruturado em markdown.
    artifacts:
      operational_framework: |
        Passo 1 — Identificar o confronto e competição a partir do research-focus.md.
        Confirmar data, horário, casa de apostas disponível (Superbet/Betano) e mercados de interesse.

        Passo 2 — Coletar forma recente de cada equipe via SofaScore e WhoScored:
        últimas 5 partidas na competição específica e últimas 5 partidas em geral.
        Registrar resultados, placares e se foi como mandante ou visitante.

        Passo 3 — Extrair dados avançados do FBref: xG e xGA médios por jogo nas últimas
        10 partidas, progressive passes, taxa de pressão e eficiência em bolas paradas.
        Anotar a fonte e data de atualização dos dados.

        Passo 4 — Pesquisar H2H via SofaScore e Transfermarkt: últimos 10 confrontos diretos
        com placar, local, competição e padrões recorrentes (jogos com muitos gols, dominância
        de um lado, tendência de empate).

        Passo 5 — Verificar notícias de lesões e suspensões via WhoScored e Transfermarkt.
        Classificar impacto como ALTO (titular indiscutível ausente), MÉDIO (jogador importante
        mas com substituto de qualidade) ou BAIXO (reserva ou jogador periférico).

        Passo 6 — Capturar odds atuais de ambas as casas (Superbet e Betano) para os mercados
        principais: resultado (1X2), ambas marcam (BTTS), over/under 2.5 gols, handicap asiático
        e mercados especiais relevantes (artilheiro, escanteios, cartões).

        Passo 7 — Organizar tudo no formato de dossiê estruturado com seções claramente
        identificadas, cada dado com sua fonte entre parênteses. Não incluir opiniões ou
        interpretações — apenas fatos verificados.

