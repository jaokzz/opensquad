            # Monitor ao Vivo — Brasil x Argentina
            **Copa do Mundo 2026 | Grupo D | 15/06/2026**
            **Monitor: Marcos Monteiro | Atualizado: 15/06/2026 21:47 (37' do 1T)**

            ---

            ## Status das Legs Ativas neste Jogo

            | Leg                    | Mercado              | Odd Entrada | Status    |
            |------------------------|---------------------|-------------|-----------|
            | Argentina vence Brasil | Resultado Final (2)  | 2.65 Betano | Em andamento |

            ---

            ## Dados ao Vivo — 37 minutos (SofaScore, 21:47)

            | Indicador           | Brasil | Argentina |
            |---------------------|--------|-----------|
            | Placar              | 0      | 0         |
            | Posse de bola       | 48%    | 52%       |
            | Chutes totais       | 5      | 7         |
            | Chutes no gol       | 2      | 3         |
            | xG acumulado        | 0.52   | 0.81      |
            | Escanteios          | 2      | 4         |
            | Cartões amarelos    | 1      | 0         |

            ---

            ## Avaliação da Leg — Argentina Vence

            **Probabilidade revisada ao vivo:** 41% (subiu de 38% pré-jogo)
            **Motivo:** Argentina controla o xG (0.81 vs 0.52) e tem mais escanteios.
            O padrão de jogo confirma a vantagem analítica prevista pré-jogo.

            **Status:** Leg dentro do esperado. Nenhum alerta ativo.

            ---

            ## Atualização — 68 minutos (22:18)

            **ALERTA AMARELO — Situação relevante detectada**

            Rodrygo entrou em campo aos 64' (estava como dúvida). Brasil pressionou e
            criou 2 finalizações no gol em sequência. xG Brasil sobe para 1.34 vs
            Argentina 0.93.

            | Indicador           | Brasil | Argentina |
            |---------------------|--------|-----------|
            | Placar              | 0      | 0         |
            | xG acumulado        | 1.34   | 0.93      |

            **Probabilidade revisada:** Argentina vence = 31% | Empate = 35% | Brasil = 34%
            O jogo virou e o equilíbrio está maior. A leg não está perdida, mas a
            vantagem analítica da Argentina diminuiu.

            **Recomendação ao squad:** Monitorar próximos 10 minutos. Se Brasil marcar,
            acionar alerta vermelho (leg compromisso de derrota) e avaliar cash-out
            das demais legs da múltipla.

            ---

            ## Atualização Final — 90+3' (23:05)

            **Resultado: Argentina 1 x 0 Brasil — Leg GANHA**

            Di María marcou aos 87'. Brasil empurrou no final mas o gol não saiu.
