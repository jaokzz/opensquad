squad: "apostas-esportivas"
version: "1.0.0"

steps:
  - step: 1
    name: "checkpoint-foco-pesquisa"
    file: "steps/step-01-checkpoint-foco-pesquisa.md"
    type: checkpoint

  - step: 2
    name: "pesquisa-dados"
    file: "steps/step-02-pesquisa-dados.md"
    type: agent
    agent: "apostas-esportivas/agents/rafael-rodrigues"
    execution: subagent

  - step: 3
    name: "analise-pre-jogo"
    file: "steps/step-03-analise-pre-jogo.md"
    type: agent
    agent: "apostas-esportivas/agents/adriana-azevedo"
    execution: inline

  - step: 4
    name: "selecao-legs-multipla"
    file: "steps/step-04-selecao-legs-multipla.md"
    type: agent
    agent: "apostas-esportivas/agents/valter-vieira"
    execution: inline

  - step: 5
    name: "checkpoint-aprovacao-multipla"
    file: "steps/step-05-checkpoint-aprovacao-multipla.md"
    type: checkpoint

  - step: 6
    name: "monitoramento-ao-vivo"
    file: "steps/step-06-monitoramento-ao-vivo.md"
    type: agent
    agent: "apostas-esportivas/agents/marcos-monteiro"
    execution: inline

  - step: 7
    name: "revisao-final"
    file: "steps/step-07-revisao-final.md"
    type: agent
    agent: "apostas-esportivas/agents/camila-campos"
    execution: inline
    on_reject: 3

  - step: 8
    name: "checkpoint-aprovacao-final"
    file: "steps/step-08-checkpoint-aprovacao-final.md"
    type: checkpoint
