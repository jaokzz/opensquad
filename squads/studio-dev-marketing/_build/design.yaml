    input_file: "squads/studio-dev-marketing/output/reel-script.md"
    model_tier: "fast"

investigation:
  enriched: false

research_brief: |
  ## Animações Web (André Animação)
  - Motion (ex-Framer Motion): melhor para React/Next.js em 2026, 2.5x mais rápido que GSAP em valores desconhecidos, tree-shaking nativo
  - GSAP: padrão da indústria para scroll-based e timelines complexas, usado por Disney/Google/Apple/Stripe, ideal para sequências precisas
  - Three.js + React Three Fiber: para 3D e WebGL, API declarativa sobre Three.js
  - Recomendação: Motion para interfaces React/Next.js; GSAP para scroll imersivo; Three.js para 3D

  ## Instagram Reels (Lucas Leads + Gabriela Gancho)
  - Contas postando 2+ Reels/semana crescem 4.2x mais rápido
  - Hook nos primeiros 3 segundos define 80% do desempenho
  - Algoritmo 2026: prioriza completions, replays, shares para DMs > saves > comments > likes
  - Originality Score: conteúdo reciclado (watermark TikTok) penalizado
  - Áudio original e voiceover ganham preferência algorítmica
  - Trial Reels: feature para alcançar não-seguidores sem mostrar para seguidores atuais
  - Foco em 15-30s para máximo completion rate

  ## Segurança Web (Sandro Segurança)
  - PMEs são 3x mais visadas que grandes empresas
  - Custo médio de breach: $200K (perda de receita + legal + reputação)
  - Prioridades 2026: SSL/HTTPS forçado, MFA, WAF, patches imediatos, backups
  - Bots IA agentic (2026): atacantes usando decisões autônomas em tempo real
  - 40% dos servidores MCP têm falhas de segurança (pesquisa recente)

