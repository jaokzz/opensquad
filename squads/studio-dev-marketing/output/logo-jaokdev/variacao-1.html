<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 500px;
    height: 500px;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .glow-gold {
    position: absolute;
    width: 380px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(201,168,76,0.10) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .glow-purple {
    position: absolute;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(110,30,180,0.16) 0%, transparent 70%);
    bottom: -60px;
    right: -60px;
    pointer-events: none;
  }

  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: rgba(201,168,76,0.45);
    border-style: solid;
  }
  .tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
  .tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
  .bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
  .br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

  .wrap {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .lockup {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  /* Ícone SVG loop */
  .icon svg {
    display: block;
  }

  .divider {
    width: 1.5px;
    height: 42px;
    background: linear-gradient(to bottom, transparent, rgba(201,168,76,0.45), transparent);
  }

  .name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 64px;
    letter-spacing: -3px;
    line-height: 1;
    color: #FFFFFF;
    text-shadow: 0 0 40px rgba(255,255,255,0.10);
  }

  .name .dev {
    color: #C9A84C;
    text-shadow: 0 0 24px rgba(201,168,76,0.45);
  }

  .bar {
    width: 100%;
    height: 1.5px;
    background: linear-gradient(90deg, transparent 0%, #C9A84C 30%, #f0d080 50%, #C9A84C 70%, transparent 100%);
    margin-top: 10px;
    filter: blur(0.4px);
  }

  .tag {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    margin-top: 14px;
  }
</style>
</head>
<body>
  <div class="glow-gold"></div>
  <div class="glow-purple"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="wrap">
    <div class="lockup">

      <!-- Ícone: loop geométrico em duas espessuras -->
      <div class="icon">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="1.8" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- Arco superior: curva indo da esquerda para direita pelo topo -->
          <path
            d="M10 30 C10 14, 42 14, 42 30"
            stroke="#C9A84C"
            stroke-width="3"
            stroke-linecap="round"
            fill="none"
            filter="url(#glow)"
          />

          <!-- Arco inferior: curva voltando da direita para esquerda pelo fundo -->
          <path
            d="M42 30 C42 44, 10 44, 10 30"
            stroke="rgba(201,168,76,0.35)"
            stroke-width="1.5"
            stroke-linecap="round"
            fill="none"
          />

          <!-- Ponto de entrada — dourado vivo -->
          <circle cx="10" cy="30" r="3" fill="#C9A84C" filter="url(#glow)"/>

          <!-- Ponto de saída — branco -->
          <circle cx="42" cy="30" r="2" fill="rgba(255,255,255,0.5)"/>

          <!-- Seta indicando direção do loop (no arco superior, à direita) -->
          <path
            d="M36 17 L42 22 L37 25"
            stroke="#C9A84C"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            fill="none"
            filter="url(#glow)"
          />
        </svg>
      </div>

      <div class="divider"></div>

      <div class="name">jaok<span class="dev">dev</span></div>
    </div>

    <div class="bar"></div>
    <div class="tag">web · automation</div>
  </div>
</body>
</html>
