<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 500px;
    height: 500px;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Glow roxo de fundo */
  .glow {
    position: absolute;
    width: 340px;
    height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(120, 40, 200, 0.18) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .wrap {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 72px;
    letter-spacing: -3px;
    line-height: 1;
    color: #FFFFFF;
  }

  .name .dev {
    color: #C9A84C;
  }

  .tag {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-top: 10px;
  }

  /* Cantos decorativos */
  .corner {
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: rgba(201,168,76,0.4);
    border-style: solid;
  }
  .tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
  .tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; }
  .bl { bottom: 16px; left: 16px; border-width: 0 0 2px 2px; }
  .br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="wrap">
    <div class="name">jaok<span class="dev">dev</span></div>
    <div class="tag">web · automation</div>
  </div>
</body>
</html>
